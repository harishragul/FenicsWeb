{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FenicsWeb{% block page_title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    body { background: #f0f2f5; }
    .sidebar-wrapper { width: 220px; min-width: 220px; }
    .main-wrapper { min-width: 0; }
    .nav-pills .nav-link.active { background: #3d5a80; }
    .nav-pills .nav-link:hover:not(.active):not(.disabled) { background: rgba(255,255,255,.08); }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .pipeline-connector { flex: 1; max-width: 48px; border-top: 2px solid; }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh;">

  <!-- Sidebar -->
  <div class="sidebar-wrapper flex-shrink-0">
    {% include 'partials/sidebar.html' %}
  </div>

  <!-- Main content -->
  <div class="main-wrapper flex-grow-1 d-flex flex-column">

    <!-- Top navbar -->
    <nav class="navbar bg-white border-bottom px-4 py-2">
      <div class="d-flex align-items-center gap-3 w-100">
        {% block breadcrumb %}
          <a href="{% url 'home' %}" class="text-decoration-none text-secondary small">Projects</a>
        {% endblock %}
      </div>
    </nav>

    <!-- Page body -->
    <div class="p-4 flex-grow-1">
      {% block content %}{% endblock %}
    </div>

  </div>
</div>
{% block extra_js %}{% endblock %}
</body>
</html>
